<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLATFORMA — Калькулятор стройматериалов</title>
<meta name="description" content="Бесплатный расчёт кровли, фасада и утепления за 2 минуты. Точная спецификация, сравнение цен реальных поставщиков, готовая PDF-смета."/>

<meta property="og:description" content="Бесплатный расчёт кровли, фасада и утепления за 2 минуты. Сравнение цен реальных поставщиков и готовая PDF-смета."/>

<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="PLATFORMA — Калькулятор стройматериалов"/>

<!-- React/ReactDOM/Babel отдаются нашим же backend'ом (static/vendor/), а не
     с unpkg.com. unpkg — далеко не всегда стабильно доступен из российских
     сетей (то не грузится, то долго), а без React страница вообще ничего
     не рендерит — снаружи это выглядит как "калькулятор не работает".
     Библиотеки маленькие и меняются редко, кэшируются браузером как обычный
     статический файл — self-host полностью убирает эту точку отказа. -->
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<style>
:root{
  --bg:#f5f5f2;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.25);
  --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
  --accent:#1a1a18;--accent-fg:#fff;
  --green-bg:#eaf3de;--green-fg:#27500a;--green-border:#c0dd97;
  --blue-bg:#e6f1fb;--blue-fg:#185fa5;
  --amber-bg:#faeeda;--amber-fg:#854f0b;
  --red-bg:#fcebeb;--red-fg:#791f1f;--red-border:#f7c1c1;
  --r-md:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:15px}
a{color:inherit}
/* Touch-friendly inputs: min 44px height, 16px font (prevents iOS auto-zoom on focus) */
input,select{background:var(--surface);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:12px 14px;font-size:16px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none;min-height:44px}
input:focus,select:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(0,0,0,0.07)}
input.field-invalid,select.field-invalid{border-color:var(--red-border);background:var(--red-bg)}
.field-error{font-size:12px;color:var(--red-fg);margin-top:5px;line-height:1.3}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all 0.15s}
/* Touch-friendly buttons: min 44px height */
.btn{background:var(--accent);color:var(--accent-fg);border-radius:var(--r-md);padding:12px 20px;font-size:14px;font-weight:500;letter-spacing:-0.1px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn:hover{opacity:0.85}
.btn:active{transform:scale(0.98)}
.btn:disabled,.btn[disabled]{opacity:0.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:12px 20px;font-size:14px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn-ghost:hover{background:var(--surface2)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem}
select option{background:var(--surface)}
.spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;display:inline-block;animation:spin 0.7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Sticky total bar — fixed to bottom on mobile so the sum is visible without scrolling */
.sticky-total-spacer{display:none}
@media (max-width:640px){
  .sticky-total{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--surface);
    border-top:0.5px solid var(--border);padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 16px rgba(0,0,0,0.10)}
  .sticky-total-spacer{display:block;height:96px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/static/app.js"></script>
</body>
</html>
