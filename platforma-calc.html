<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLATFORMA — Калькулятор стройматериалов</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#f5f5f2;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.25);
  --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
  --accent:#1a1a18;--accent-fg:#fff;
  --green-bg:#eaf3de;--green-fg:#27500a;--green-border:#c0dd97;
  --blue-bg:#e6f1fb;--blue-fg:#185fa5;
  --amber-bg:#faeeda;--amber-fg:#854f0b;
  --r-md:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:15px}
a{color:inherit}
input,select{background:var(--surface);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:9px 12px;font-size:14px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(0,0,0,0.07)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all 0.15s}
.btn{background:var(--accent);color:var(--accent-fg);border-radius:var(--r-md);padding:11px 20px;font-size:14px;font-weight:500;letter-spacing:-0.1px}
.btn:hover{opacity:0.85}
.btn:active{transform:scale(0.98)}
.btn:disabled,.btn[disabled]{opacity:0.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:11px 20px;font-size:14px}
.btn-ghost:hover{background:var(--surface2)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem}
select option{background:var(--surface)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

/* ── DATA ─────────────────────────────────────── */
const SUPPLIERS = [
  {id:1,name:"СтройМаркет МО",region:"Москва и область",delivery:2,minOrder:5000,phone:"+7 (495) 123-45-67",rating:4.8,factor:1.00,badge:"Лучшая цена"},
  {id:2,name:"КровМатериалы",region:"Ногинск, Богородский р-н",delivery:1,minOrder:3000,phone:"+7 (496) 234-56-78",rating:4.9,factor:0.95,badge:"Быстрая доставка"},
  {id:3,name:"PLATFORMA Склад",region:"Богородский р-н",delivery:0,minOrder:0,phone:"+7 (496) 345-67-89",rating:5.0,factor:0.90,badge:"Самовывоз"},
];

/* ── CALCULATORS ──────────────────────────────── */
function calcRoofing({length,width,angle,material}){
  const rad = angle * Math.PI / 180;
  const slopeLen = (width/2) / Math.cos(rad);
  const area = length * slopeLen * 2 * 1.10; // +10% нахлёст
  const matPrices = {metal_tile:650, soft_roof:480, profnastil:420};
  const matNames  = {metal_tile:"Металлочерепица", soft_roof:"Мягкая кровля (GAF)", profnastil:"Профнастил С-20"};
  return [
    {name:matNames[material]||"Металлочерепица", qty:Math.ceil(area),    unit:"м²",    price:matPrices[material]||650, cat:"main"},
    {name:"Конёк (планка 3м)",                    qty:Math.ceil((length+0.3)/3), unit:"шт", price:580, cat:"elem"},
    {name:"Гидроизоляция Изоспан А",              qty:Math.ceil(area*1.15/15)*15, unit:"м²", price:45, cat:"elem"},
    {name:"Обрешётка (доска 25×100мм)",           qty:Math.ceil(length * Math.ceil(slopeLen/0.35) * 2), unit:"пог.м", price:28, cat:"wood"},
    {name:"Саморезы кровельные (уп 250шт)",       qty:Math.ceil(Math.ceil(area/2)*8/250), unit:"уп", price:320, cat:"fastener"},
    {name:"Ветровая планка",                       qty:Math.ceil(slopeLen*2/2), unit:"шт", price:290, cat:"elem"},
    {name:"Уплотнитель конька",                    qty:Math.ceil(length+0.3),  unit:"пог.м", price:85, cat:"seal"},
  ];
}

function calcFacade({length,width,height,windows,doors,material}){
  const perim = 2*(+length + +width);
  const wallArea = perim * +height;
  const openings = +windows*1.5 + +doors*2.1;
  const net = wallArea - openings;
  const specs = {
    siding:       {name:"Сайдинг виниловый",      price:390, area:0.115},
    facade_panel: {name:"Фасадная панель Döcke",  price:550, area:0.24},
    fiber:        {name:"Хаубер (фиброцемент)",   price:850, area:0.24},
  };
  const s = specs[material] || specs.siding;
  return [
    {name:s.name,               qty:Math.ceil(net/s.area*1.07), unit:"шт",    price:s.price, cat:"main"},
    {name:"Внешний угол (3м)",  qty:Math.ceil(+height/3)*4,     unit:"шт",    price:220, cat:"elem"},
    {name:"Стартовая планка",   qty:Math.ceil(perim/3.6),       unit:"шт",    price:180, cat:"elem"},
    {name:"Финишная планка",    qty:Math.ceil(perim/3.6),       unit:"шт",    price:175, cat:"elem"},
    {name:"J-профиль оконный",  qty:Math.ceil((+windows*0.75+doors*0.9)*2), unit:"шт", price:160, cat:"elem"},
    {name:"Саморезы (уп 250шт)",qty:Math.ceil(net*1.5/250),    unit:"уп",    price:280, cat:"fastener"},
    {name:"Подоконник 150мм",   qty:+windows,                   unit:"шт",    price:320, cat:"elem"},
  ];
}

function calcInsulation({area,thickness,material}){
  const mats = {
    mineral: {name:"Минвата КНАУФ (уп 3м²)", price:1850, slab:0.05},
    foam:    {name:"Пенопласт ПСБ-25 (уп 3м²)", price:1200, slab:0.05},
    epp:     {name:"Пенополистирол XPS (уп 3м²)", price:2100, slab:0.05},
  };
  const m = mats[material] || mats.mineral;
  const layers = Math.ceil(+thickness / m.slab);
  return [
    {name:m.name,                    qty:Math.ceil(area*layers/3*1.05), unit:"уп",  price:m.price, cat:"main"},
    {name:"Дюбель-зонтик",           qty:Math.ceil(area*6),             unit:"шт",  price:8, cat:"fastener"},
    {name:"Армировочная сетка",      qty:Math.ceil(area*1.1),           unit:"м²",  price:55, cat:"elem"},
    {name:"Фасадный клей (меш 25кг)",qty:Math.ceil(area/3),             unit:"меш", price:480, cat:"elem"},
    {name:"Пароизоляция",            qty:Math.ceil(area*1.1),           unit:"м²",  price:38, cat:"elem"},
  ];
}

/* ── UTILS ────────────────────────────────────── */
const fmt = n => new Intl.NumberFormat("ru-RU").format(Math.round(n)) + " ₽";
const today = () => new Date().toLocaleDateString("ru-RU");
const quoteNum = () => "КП-" + (Math.floor(Math.random()*9000)+1000);
const CAT_LABELS = {main:"Основной материал",elem:"Элементы и комплектующие",wood:"Деревянные конструкции",fastener:"Крепёж",seal:"Уплотнители"};

/* ── SHARED COMPONENTS ────────────────────────── */
function FieldRow({label, children}){
  return (
    <div style={{display:"grid",gridTemplateColumns:"130px 1fr",gap:"10px",alignItems:"center",marginBottom:"10px"}}>
      <label style={{fontSize:"13px",color:"var(--text2)"}}>{label}</label>
      {children}
    </div>
  );
}

function StepBar({steps, current}){
  return (
    <div style={{display:"flex",gap:"0",marginBottom:"1.5rem",position:"relative"}}>
      <div style={{position:"absolute",top:"14px",left:"14px",right:"14px",height:"1px",background:"var(--border2)"}}/>
      {steps.map((s,i) => (
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",position:"relative",zIndex:1}}>
          <div style={{
            width:"28px",height:"28px",borderRadius:"50%",
            background: i < current ? "var(--accent)" : i === current ? "var(--accent)" : "var(--bg)",
            border: i <= current ? "none" : "1px solid var(--border2)",
            color: i <= current ? "var(--accent-fg)" : "var(--text3)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:"12px",fontWeight:"500",
          }}>
            {i < current ? "✓" : i+1}
          </div>
          <span style={{fontSize:"11px",color:i===current?"var(--text)":"var(--text3)",textAlign:"center",lineHeight:1.2}}>{s}</span>
        </div>
      ))}
    </div>
  );
}

function InfoBox({children}){
  return (
    <div style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:"var(--r-md)",fontSize:"13px",color:"var(--text2)",marginBottom:"14px"}}>
      {children}
    </div>
  );
}

/* ── ROOFING FORM ─────────────────────────────── */
function RoofingForm({onResult}){
  const[p,setP] = useState({length:10,width:8,angle:30,material:"metal_tile"});
  const up = (k,v) => setP(x=>({...x,[k]:v}));
  const slopeLen = (p.width/2) / Math.cos(p.angle*Math.PI/180);
  const area = Math.round(p.length * slopeLen * 2 * 1.10);
  return (
    <div>
      <InfoBox>Двускатная крыша. Все размеры — по внешним габаритам.</InfoBox>
      <FieldRow label="Длина дома (м)"><input type="number" value={p.length} min="3" max="60" step="0.5" onChange={e=>up("length",+e.target.value)}/></FieldRow>
      <FieldRow label="Ширина дома (м)"><input type="number" value={p.width} min="3" max="30" step="0.5" onChange={e=>up("width",+e.target.value)}/></FieldRow>
      <FieldRow label="Угол ската (°)"><input type="number" value={p.angle} min="10" max="60" step="5" onChange={e=>up("angle",+e.target.value)}/></FieldRow>
      <FieldRow label="Материал">
        <select value={p.material} onChange={e=>up("material",e.target.value)}>
          <option value="metal_tile">Металлочерепица</option>
          <option value="soft_roof">Мягкая кровля</option>
          <option value="profnastil">Профнастил</option>
        </select>
      </FieldRow>
      <div style={{padding:"12px",background:"var(--green-bg)",borderRadius:"var(--r-md)",marginBottom:"1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"13px",color:"var(--green-fg)"}}>Площадь кровли (с нахлёстом 10%)</span>
        <span style={{fontSize:"20px",fontWeight:"600",color:"var(--green-fg)"}}>{area} м²</span>
      </div>
      <button className="btn" style={{width:"100%"}} onClick={()=>onResult(calcRoofing(p))}>Рассчитать →</button>
    </div>
  );
}

/* ── FACADE FORM ──────────────────────────────── */
function FacadeForm({onResult}){
  const[p,setP] = useState({length:10,width:8,height:3,windows:6,doors:2,material:"siding"});
  const up = (k,v) => setP(x=>({...x,[k]:v}));
  const net = Math.round(2*(p.length+p.width)*p.height - (p.windows*1.5+p.doors*2.1));
  return (
    <div>
      <InfoBox>Периметр × высота за вычетом оконных и дверных проёмов.</InfoBox>
      <FieldRow label="Длина дома (м)"><input type="number" value={p.length} min="3" max="60" step="0.5" onChange={e=>up("length",+e.target.value)}/></FieldRow>
      <FieldRow label="Ширина дома (м)"><input type="number" value={p.width} min="3" max="30" step="0.5" onChange={e=>up("width",+e.target.value)}/></FieldRow>
      <FieldRow label="Высота стен (м)"><input type="number" value={p.height} min="2" max="12" step="0.5" onChange={e=>up("height",+e.target.value)}/></FieldRow>
      <FieldRow label="Окна (шт)"><input type="number" value={p.windows} min="0" max="40" onChange={e=>up("windows",+e.target.value)}/></FieldRow>
      <FieldRow label="Двери (шт)"><input type="number" value={p.doors} min="0" max="10" onChange={e=>up("doors",+e.target.value)}/></FieldRow>
      <FieldRow label="Материал">
        <select value={p.material} onChange={e=>up("material",e.target.value)}>
          <option value="siding">Виниловый сайдинг</option>
          <option value="facade_panel">Фасадные панели Döcke</option>
          <option value="fiber">Хаубер / фиброцемент</option>
        </select>
      </FieldRow>
      <div style={{padding:"12px",background:"var(--green-bg)",borderRadius:"var(--r-md)",marginBottom:"1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"13px",color:"var(--green-fg)"}}>Площадь фасада (чистая)</span>
        <span style={{fontSize:"20px",fontWeight:"600",color:"var(--green-fg)"}}>{net} м²</span>
      </div>
      <button className="btn" style={{width:"100%"}} onClick={()=>onResult(calcFacade(p))}>Рассчитать →</button>
    </div>
  );
}

/* ── INSULATION FORM ──────────────────────────── */
function InsulationForm({onResult}){
  const[p,setP] = useState({area:80,thickness:0.15,material:"mineral"});
  const up = (k,v) => setP(x=>({...x,[k]:v}));
  return (
    <div>
      <InfoBox>Расчёт по площади и требуемой толщине. Запас 5%.</InfoBox>
      <FieldRow label="Площадь (м²)"><input type="number" value={p.area} min="5" max="1000" step="5" onChange={e=>up("area",+e.target.value)}/></FieldRow>
      <FieldRow label="Толщина слоя">
        <select value={p.thickness} onChange={e=>up("thickness",+e.target.value)}>
          <option value={0.05}>50 мм</option>
          <option value={0.10}>100 мм</option>
          <option value={0.15}>150 мм</option>
          <option value={0.20}>200 мм</option>
        </select>
      </FieldRow>
      <FieldRow label="Материал">
        <select value={p.material} onChange={e=>up("material",e.target.value)}>
          <option value="mineral">Минеральная вата КНАУФ</option>
          <option value="foam">Пенопласт ПСБ-25</option>
          <option value="epp">Пенополистирол XPS</option>
        </select>
      </FieldRow>
      <button className="btn" style={{width:"100%",marginTop:"0.5rem"}} onClick={()=>onResult(calcInsulation(p))}>Рассчитать →</button>
    </div>
  );
}

/* ── MATERIALS TABLE ──────────────────────────── */
function MaterialsTable({items, factor=1}){
  const total = items.reduce((a,it)=>a+it.qty*it.price*factor,0);
  const grouped = Object.entries(CAT_LABELS)
    .map(([k,label])=>[label, items.filter(x=>x.cat===k)])
    .filter(([,g])=>g.length>0);
  return (
    <div>
      {grouped.map(([label,group])=>(
        <div key={label} style={{marginBottom:"1rem"}}>
          <div style={{fontSize:"11px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:"6px"}}>{label}</div>
          {group.map((it,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px 80px 90px",gap:"6px",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--border)"}}>
              <span style={{fontSize:"13px"}}>{it.name}</span>
              <span style={{fontSize:"13px",color:"var(--text2)",textAlign:"right"}}>{it.qty}&nbsp;{it.unit}</span>
              <span style={{fontSize:"13px",color:"var(--text2)",textAlign:"right"}}>{fmt(it.price*factor)}</span>
              <span style={{fontSize:"13px",fontWeight:"500",textAlign:"right"}}>{fmt(it.qty*it.price*factor)}</span>
            </div>
          ))}
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingTop:"12px",borderTop:"1.5px solid var(--text)"}}>
        <span style={{fontWeight:"500"}}>Итого</span>
        <span style={{fontSize:"22px",fontWeight:"600"}}>{fmt(total)}</span>
      </div>
    </div>
  );
}

/* ── SUPPLIER CARDS ───────────────────────────── */
function SupplierCards({items, selected, onSelect}){
  const sorted = useMemo(()=>{
    return SUPPLIERS.map(s=>({
      ...s,
      total: Math.round(items.reduce((a,it)=>a+it.qty*it.price*s.factor,0)),
    })).sort((a,b)=>a.total-b.total);
  },[items]);

  const badgeStyle = (i) => {
    const styles = [
      {bg:"var(--green-bg)",fg:"var(--green-fg)"},
      {bg:"var(--blue-bg)", fg:"var(--blue-fg)"},
      {bg:"var(--amber-bg)",fg:"var(--amber-fg)"},
    ];
    return styles[i] || styles[0];
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      {sorted.map((s,i)=>{
        const bs = badgeStyle(i);
        const isSelected = selected?.id === s.id;
        return (
          <div key={s.id} onClick={()=>onSelect(s)}
            style={{
              padding:"1rem 1.25rem",borderRadius:"var(--r-lg)",cursor:"pointer",
              background:"var(--surface)",
              border: isSelected ? "2px solid var(--text)" : "0.5px solid var(--border)",
              transition:"border-color 0.15s",
            }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                  <span style={{fontWeight:"600",fontSize:"15px"}}>{s.name}</span>
                  <span style={{fontSize:"11px",fontWeight:"500",padding:"3px 9px",borderRadius:"20px",background:bs.bg,color:bs.fg}}>{s.badge}</span>
                </div>
                <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"3px"}}>{s.region} · {s.delivery===0?"самовывоз":`доставка ${s.delivery} дн.`}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:"12px"}}>
                <div style={{fontSize:"20px",fontWeight:"700"}}>{fmt(s.total)}</div>
                {s.factor<1&&<div style={{fontSize:"12px",color:"var(--green-fg)",fontWeight:"500"}}>−{Math.round((1-s.factor)*100)}% скидка</div>}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:"8px",borderTop:"0.5px solid var(--border)"}}>
              <span style={{fontSize:"12px",color:"var(--text2)"}}>⭐ {s.rating} · Мин. заказ {s.minOrder===0?"без лимита":fmt(s.minOrder)}</span>
              <span style={{fontSize:"12px",color:"var(--text2)"}}>{s.phone}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── QUOTE VIEW ───────────────────────────────── */
function QuoteView({items, supplier, calcType, onBack, onNew}){
  const[name,setName] = useState("");
  const[phone,setPhone] = useState("");
  const[sent,setSent] = useState(false);
  const num = useMemo(()=>quoteNum(),[]);
  const date = today();
  const typeNames = {roofing:"Кровля",facade:"Фасад",insulation:"Утепление"};
  const typeName = typeNames[calcType]||"Материалы";
  const f = supplier.factor;
  const total = Math.round(items.reduce((a,it)=>a+it.qty*it.price*f,0));

  function printPDF(){
    const w = window.open("","_blank","width=800,height=700");
    const rows = items.map(it=>`
      <tr>
        <td>${it.name}</td>
        <td class="c">${it.qty} ${it.unit}</td>
        <td class="r">${new Intl.NumberFormat("ru-RU").format(Math.round(it.price*f))} ₽</td>
        <td class="r"><b>${new Intl.NumberFormat("ru-RU").format(Math.round(it.qty*it.price*f))} ₽</b></td>
      </tr>`).join("");
    w.document.write(`<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"/><title>${num}</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;padding:40px;max-width:800px;margin:0 auto;color:#1a1a18;font-size:13px}
  .header{display:flex;justify-content:space-between;padding-bottom:20px;border-bottom:2px solid #1a1a18;margin-bottom:24px}
  .logo{font-size:26px;font-weight:700;letter-spacing:-1px}
  .logo-sub{font-size:12px;color:#888;margin-top:2px}
  .meta{text-align:right;font-size:12px;color:#888;line-height:1.8}
  .meta b{color:#1a1a18;font-size:14px}
  table{width:100%;border-collapse:collapse;margin:0 0 20px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:8px 6px;border-bottom:1.5px solid #1a1a18;color:#888}
  td{padding:8px 6px;border-bottom:0.5px solid #e0e0e0;font-size:13px}
  .c{text-align:center}.r{text-align:right}
  .total-row{font-size:16px;font-weight:700;border-top:2px solid #1a1a18!important;padding-top:12px}
  .footer{margin-top:32px;padding-top:16px;border-top:0.5px solid #e0e0e0;font-size:11px;color:#aaa;line-height:1.8}
  .supplier-block{background:#f5f5f2;padding:14px 18px;border-radius:8px;margin:16px 0;font-size:13px}
  @media print{button{display:none}}
</style></head>
<body>
<div class="header">
  <div>
    <div class="logo">PLATFORMA</div>
    <div class="logo-sub">Кровельные и фасадные материалы</div>
    <div class="logo-sub">Богородский р-н, Московская область</div>
  </div>
  <div class="meta">
    <b>${num}</b><br/>
    Дата: ${date}<br/>
    Тип расчёта: ${typeName}
  </div>
</div>
<div class="supplier-block">
  <b>Поставщик:</b> ${supplier.name} &nbsp;·&nbsp;
  ${supplier.delivery===0?"Самовывоз":`Доставка ${supplier.delivery} дн.`} &nbsp;·&nbsp;
  ${supplier.phone}
</div>
<table>
  <thead><tr>
    <th>Наименование</th>
    <th class="c">Количество</th>
    <th class="r">Цена</th>
    <th class="r">Сумма</th>
  </tr></thead>
  <tbody>${rows}
    <tr>
      <td class="total-row" colspan="3"><b>Итого к оплате</b></td>
      <td class="total-row r">${new Intl.NumberFormat("ru-RU").format(total)} ₽</td>
    </tr>
  </tbody>
</table>
<div class="footer">
  Коммерческое предложение действительно 14 дней с даты выставления.<br/>
  Цены указаны с НДС. Доставка рассчитывается отдельно.<br/>
  PLATFORMA — кровельные и фасадные материалы, Богородский р-н МО.
</div>
</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),500);
  }

  return (
    <div style={{maxWidth:"720px",margin:"0 auto",padding:"20px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem"}}>
        <div>
          <div style={{fontSize:"11px",color:"var(--text3)",letterSpacing:"0.5px",textTransform:"uppercase"}}>{num} · {date}</div>
          <h1 style={{fontSize:"22px",fontWeight:"700",letterSpacing:"-0.5px",marginTop:"4px"}}>Коммерческое предложение</h1>
          <div style={{fontSize:"13px",color:"var(--text2)",marginTop:"2px"}}>Тип: {typeName}</div>
        </div>
        <button className="btn-ghost" onClick={onBack} style={{flexShrink:0}}>← Назад</button>
      </div>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"1.25rem"}}>
        {[
          {label:"Поставщик",    value:supplier.name,   sub:supplier.region},
          {label:"Доставка",     value:supplier.delivery===0?"Самовывоз":`${supplier.delivery} дня`, sub:supplier.phone},
          {label:"Сумма сметы",  value:fmt(total),      sub:"Включая скидку"},
        ].map(({label,value,sub})=>(
          <div key={label} style={{background:"var(--surface2)",borderRadius:"var(--r-md)",padding:"12px"}}>
            <div style={{fontSize:"12px",color:"var(--text3)"}}>{label}</div>
            <div style={{fontWeight:"600",fontSize:"15px",marginTop:"4px",lineHeight:1.2}}>{value}</div>
            <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* Spec table */}
      <div className="card" style={{marginBottom:"1rem"}}>
        <div style={{fontSize:"12px",fontWeight:"600",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"14px"}}>Спецификация</div>
        <MaterialsTable items={items} factor={f}/>
      </div>

      {/* Request form */}
      {!sent ? (
        <div className="card" style={{marginBottom:"1rem"}}>
          <div style={{fontWeight:"600",fontSize:"15px",marginBottom:"12px"}}>Оставить заявку поставщику</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
            <input placeholder="Ваше имя" value={name} onChange={e=>setName(e.target.value)}/>
            <input placeholder="Телефон" value={phone} onChange={e=>setPhone(e.target.value)} type="tel"/>
          </div>
          <button className="btn" style={{width:"100%"}} onClick={()=>{if(name&&phone)setSent(true)}}>
            Отправить заявку → {supplier.name}
          </button>
          {(!name||!phone)&&<div style={{fontSize:"12px",color:"var(--text3)",marginTop:"6px",textAlign:"center"}}>Заполните имя и телефон</div>}
        </div>
      ) : (
        <div style={{padding:"1rem 1.25rem",background:"var(--green-bg)",border:"0.5px solid var(--green-border)",borderRadius:"var(--r-lg)",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{fontSize:"24px"}}>✓</div>
          <div>
            <div style={{fontWeight:"600",color:"var(--green-fg)"}}>Заявка отправлена!</div>
            <div style={{fontSize:"13px",color:"var(--green-fg)",marginTop:"2px"}}>{supplier.name} свяжется с вами по номеру {phone} в течение 2 часов.</div>
          </div>
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",gap:"10px"}}>
        <button className="btn-ghost" style={{flex:1}} onClick={printPDF}>⬇ Скачать PDF</button>
        <button className="btn" style={{flex:1}} onClick={onNew}>Новый расчёт</button>
      </div>
    </div>
  );
}

/* ── CALC TYPES ───────────────────────────────── */
const CALC_TYPES = [
  {id:"roofing",   label:"Кровля",    icon:"🏠", desc:"Металлочерепица, профнастил, мягкая кровля, все комплектующие"},
  {id:"facade",    label:"Фасад",     icon:"🧱", desc:"Сайдинг, фасадные панели, хаубер, крепёж и углы"},
  {id:"insulation",label:"Утепление", icon:"❄️", desc:"Минвата, пенопласт, пенополистирол XPS, крепёж"},
];

/* ── STEPS MAP ────────────────────────────────── */
const STEPS = ["Параметры","Материалы","Поставщик","Смета"];

/* ── MAIN APP ─────────────────────────────────── */
function App(){
  const[screen,setScreen] = useState("home");    // home | calc | quote
  const[calcType,setCalcType] = useState(null);
  const[step,setStep] = useState(0);
  const[items,setItems] = useState([]);
  const[supplier,setSupplier] = useState(null);

  function startCalc(type){
    setCalcType(type); setStep(0); setItems([]); setSupplier(null); setScreen("calc");
  }
  function onResult(r){ setItems(r); setStep(1); }
  function toQuote(){ if(supplier) setScreen("quote"); }
  function reset(){ setScreen("home"); setCalcType(null); setStep(0); setItems([]); setSupplier(null); }

  /* ── HOME ── */
  if(screen==="home") return (
    <div style={{maxWidth:"720px",margin:"0 auto",padding:"24px 20px"}}>
      <div style={{marginBottom:"32px"}}>
        <div style={{fontWeight:"700",fontSize:"24px",letterSpacing:"-0.8px"}}>PLATFORMA</div>
        <div style={{color:"var(--text2)",fontSize:"14px",marginTop:"2px"}}>Кровельные и фасадные материалы · Богородский р-н МО</div>
      </div>

      <h1 style={{fontSize:"28px",fontWeight:"700",letterSpacing:"-1px",lineHeight:1.2,marginBottom:"8px"}}>
        Рассчитайте материалы<br/>за 2 минуты
      </h1>
      <p style={{color:"var(--text2)",fontSize:"15px",marginBottom:"28px"}}>
        Точная спецификация с запасом, сравнение цен поставщиков и готовая PDF-смета.
      </p>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"12px",marginBottom:"36px"}}>
        {CALC_TYPES.map(t=>(
          <div key={t.id} onClick={()=>startCalc(t.id)} className="card"
            style={{cursor:"pointer",transition:"transform 0.12s,box-shadow 0.12s",userSelect:"none"}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)"}}
            onMouseLeave={e=>{e.currentTarget.style.transform=""}}>
            <div style={{fontSize:"28px",marginBottom:"10px"}}>{t.icon}</div>
            <div style={{fontWeight:"700",fontSize:"16px",marginBottom:"4px"}}>{t.label}</div>
            <div style={{fontSize:"13px",color:"var(--text2)",marginBottom:"16px",lineHeight:1.4}}>{t.desc}</div>
            <div style={{fontSize:"13px",fontWeight:"500",color:"var(--text)"}}>Рассчитать →</div>
          </div>
        ))}
      </div>

      <div style={{borderTop:"0.5px solid var(--border)",paddingTop:"24px"}}>
        <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:"12px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Что вы получите</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"10px"}}>
          {[
            ["📐","Точный расчёт","с запасом и всеми комплектующими"],
            ["🏪","3 поставщика","сравнение цен по вашему региону"],
            ["📄","PDF смета","как коммерческое предложение"],
            ["🚚","Доставка","по Московской области"],
          ].map(([ic,t,d])=>(
            <div key={t} style={{padding:"12px",background:"var(--surface2)",borderRadius:"var(--r-md)"}}>
              <div style={{fontSize:"18px",marginBottom:"6px"}}>{ic}</div>
              <div style={{fontWeight:"600",fontSize:"13px"}}>{t}</div>
              <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"2px",lineHeight:1.3}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  /* ── QUOTE ── */
  if(screen==="quote") return (
    <QuoteView items={items} supplier={supplier} calcType={calcType} onBack={()=>setScreen("calc")} onNew={reset}/>
  );

  /* ── CALCULATOR ── */
  const ct = CALC_TYPES.find(t=>t.id===calcType);
  return (
    <div style={{maxWidth:"720px",margin:"0 auto",padding:"20px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"22px"}}>{ct?.icon}</span>
          <div>
            <div style={{fontWeight:"700",fontSize:"16px"}}>{ct?.label}</div>
            <div style={{fontSize:"12px",color:"var(--text3)"}}>PLATFORMA</div>
          </div>
        </div>
        <button className="btn-ghost" style={{fontSize:"13px",padding:"7px 14px"}} onClick={reset}>✕ Закрыть</button>
      </div>

      <StepBar steps={STEPS} current={step}/>

      <div className="card">
        {/* Step 0 — Form */}
        {step===0 && (
          calcType==="roofing"    ? <RoofingForm    onResult={onResult}/> :
          calcType==="facade"     ? <FacadeForm     onResult={onResult}/> :
                                    <InsulationForm  onResult={onResult}/>
        )}

        {/* Step 1 — Materials */}
        {step===1 && items.length>0 && (
          <div>
            <div style={{fontWeight:"600",fontSize:"15px",marginBottom:"16px"}}>Спецификация материалов</div>
            <MaterialsTable items={items}/>
            <div style={{display:"flex",gap:"8px",marginTop:"1.25rem"}}>
              <button className="btn-ghost" style={{flex:1}} onClick={()=>setStep(0)}>← Изменить</button>
              <button className="btn" style={{flex:2}} onClick={()=>setStep(2)}>Выбрать поставщика →</button>
            </div>
          </div>
        )}

        {/* Step 2 — Suppliers */}
        {step===2 && (
          <div>
            <div style={{fontWeight:"600",fontSize:"15px",marginBottom:"14px"}}>Сравнение поставщиков</div>
            <SupplierCards items={items} selected={supplier} onSelect={setSupplier}/>
            <div style={{display:"flex",gap:"8px",marginTop:"1.25rem"}}>
              <button className="btn-ghost" style={{flex:1}} onClick={()=>setStep(1)}>← Назад</button>
              <button className="btn" style={{flex:2,opacity:supplier?1:0.35}} disabled={!supplier} onClick={toQuote}>
                Сформировать смету →
              </button>
            </div>
            {!supplier && <div style={{fontSize:"12px",color:"var(--text3)",textAlign:"center",marginTop:"8px"}}>Выберите поставщика</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
